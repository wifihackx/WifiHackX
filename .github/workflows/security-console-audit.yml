name: Security Console Audit

on:
  schedule:
    # Daily at 04:15 UTC
    - cron: '15 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-console-audit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  audit-console:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      WFX_FIREBASE_PROJECT: white-caster-466401-g0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check service account secret
        env:
          FIREBASE_SERVICE_ACCOUNT_WHITE_CASTER_466401_G0: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WHITE_CASTER_466401_G0 }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_WHITE_CASTER_466401_G0" ]; then
            echo "::error::Missing FIREBASE_SERVICE_ACCOUNT_WHITE_CASTER_466401_G0. Console audit cannot authenticate."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WHITE_CASTER_466401_G0 }}
          token_format: access_token

      - name: Run strict console audit
        env:
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: npm run security:audit:console:strict
